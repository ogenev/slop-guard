query PullRequestCommitsPage($pullRequestId: ID!, $cursor: String) {
  node(id: $pullRequestId) {
    __typename
    ... on PullRequest {
      commits(first: 100, after: $cursor) {
        pageInfo {
          hasNextPage
          endCursor
        }
        nodes {
          commit {
            oid
            message
            authoredDate
            committedDate
          }
        }
      }
    }
  }
}
